<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "PingFang SC", sans-serif;
  background: #09090b;
  color: #e2e8f0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px;
}
h1 {
  font-size: 20px; font-weight: 700;
  margin-bottom: 6px;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.sub { font-size: 13px; color: #52525b; margin-bottom: 32px; }
.diagram { width: 100%; max-width: 1060px; }

/* ── Node styles ── */
.node {
  rx: 10; ry: 10;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,.5));
}
.node-user     { fill: #1e2433; stroke: #3b4a6b; stroke-width: 1.5; }
.node-frontend { fill: #1a1f35; stroke: #4c5fd5; stroke-width: 1.5; }
.node-flask    { fill: #1e2d1e; stroke: #3a7a3a; stroke-width: 1.5; }
.node-cache    { fill: #2d2010; stroke: #8a6030; stroke-width: 1.5; }
.node-filter   { fill: #2d1020; stroke: #8a2060; stroke-width: 1.5; }
.node-trans    { fill: #102030; stroke: #205880; stroke-width: 1.5; }
.node-rss      { fill: #1a1a2e; stroke: #4444aa; stroke-width: 1.5; }
.node-tts      { fill: #1e2820; stroke: #406840; stroke-width: 1.5; }
.node-products { fill: #201828; stroke: #604880; stroke-width: 1.5; }

/* Text */
.t-label { font-size: 12px; font-weight: 700; fill: #f0f0ff; }
.t-sub   { font-size: 10px; fill: #8892a4; }
.t-code  { font-family: "SF Mono", monospace; font-size: 9px; fill: #a8b8d0; }
.t-accent { font-size: 10px; fill: #818cf8; }
.t-green  { font-size: 10px; fill: #34d399; }
.t-yellow { font-size: 10px; fill: #fbbf24; }
.t-red    { font-size: 10px; fill: #f87171; }
.t-pink   { font-size: 10px; fill: #c084fc; }

/* Arrows */
.arrow { stroke: #3a4560; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
.arrow-accent { stroke: #6366f1; stroke-width: 1.5; fill: none; stroke-dasharray: 4 3; marker-end: url(#arrowhead-accent); }
.arrow-green  { stroke: #34d399; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead-green); }
.arrow-yellow { stroke: #fbbf24; stroke-width: 1.2; fill: none; stroke-dasharray: 3 3; marker-end: url(#arrowhead-yellow); }
.arrow-pink   { stroke: #c084fc; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead-pink); }

/* Section labels */
.section-bg { fill: rgba(255,255,255,.02); rx: 12; ry: 12; stroke: #27272a; stroke-width: 1; }
.section-label { font-size: 11px; font-weight: 700; fill: #52525b; letter-spacing: 1px; text-transform: uppercase; }

/* Badge */
.badge { rx: 6; ry: 6; }
.badge-blue   { fill: rgba(99,102,241,.15); stroke: rgba(99,102,241,.4); stroke-width: 1; }
.badge-green  { fill: rgba(52,211,153,.12); stroke: rgba(52,211,153,.4); stroke-width: 1; }
.badge-yellow { fill: rgba(251,191,36,.12); stroke: rgba(251,191,36,.4); stroke-width: 1; }
.badge-pink   { fill: rgba(192,132,252,.12); stroke: rgba(192,132,252,.4); stroke-width: 1; }
</style>
</head>
